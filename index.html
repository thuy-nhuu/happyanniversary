<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<title>Heart Lock</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#f9f0f4;
    overflow:hidden;
}

/* ===== KHUNG Ổ KHÓA ===== */

.lock{
    position:relative;
    width:600px;
}

.lock img{
    width:100%;
    display:block;
}

/* ===== VÙNG NỘI DUNG ===== */

.overlay{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;

    align-items:center;

    /* chỉnh cả cụm lên xuống */
    padding-top:42%;
}

/* ===== TIÊU ĐỀ ===== */

.title{

    font-family:"Great Vibes",cursive;

    font-size:42px;

    color:#ea6b93;

    white-space:nowrap;

    text-align:center;

    margin-bottom:40px;

    text-shadow:
        0 0 10px rgba(255,255,255,.9);
}

/* ===== MẬT KHẨU ===== */

.code{
    display:flex;
    gap:14px;
}

.digit{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.arrow{

    width:30px;
    height:20px;

    display:flex;
    justify-content:center;
    align-items:center;

    cursor:pointer;

    user-select:none;

    color:#666;

    transition:.15s;
}

.arrow:hover{
    transform:scale(1.15);
}

.value{

    width:38px;
    height:48px;

    margin:3px 0;

    border-radius:8px;

    background:white;

    border:1px solid #ddd;

    box-shadow:
        0 2px 5px rgba(0,0,0,.08);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:26px;
}

/* ===== ANIMATION ===== */

.unlock{
    animation:unlock 1s forwards;
}

@keyframes unlock{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
        filter:brightness(1.15);
    }

    100%{
        transform:scale(1.3);
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="lock" id="lock">

    <img src="images/heart-lock.png" alt="Heart Lock">

    <div class="overlay">

        <div class="title">
            The Day We Got Together
        </div>

        <div class="code">

            <div class="digit">
                <div class="arrow" onclick="change(0,1)">▲</div>
                <div class="value" id="n0">0</div>
                <div class="arrow" onclick="change(0,-1)">▼</div>
            </div>

            <div class="digit">
                <div class="arrow" onclick="change(1,1)">▲</div>
                <div class="value" id="n1">0</div>
                <div class="arrow" onclick="change(1,-1)">▼</div>
            </div>

            <div class="digit">
                <div class="arrow" onclick="change(2,1)">▲</div>
                <div class="value" id="n2">0</div>
                <div class="arrow" onclick="change(2,-1)">▼</div>
            </div>

            <div class="digit">
                <div class="arrow" onclick="change(3,1)">▲</div>
                <div class="value" id="n3">0</div>
                <div class="arrow" onclick="change(3,-1)">▼</div>
            </div>

        </div>

    </div>

</div>

<script>

const PASSWORD = "1504";

let digits = [0,0,0,0];

function change(index, value){

    digits[index] += value;

    if(digits[index] > 9) digits[index] = 0;
    if(digits[index] < 0) digits[index] = 9;

    document.getElementById(
        "n" + index
    ).textContent = digits[index];

    checkPassword();
}

function checkPassword(){

    if(digits.join("") !== PASSWORD)
        return;

    document
        .getElementById("lock")
        .classList.add("unlock");

    setTimeout(() => {

        window.location.href =
            "next.html";

    },1000);
}

</script>

</body>
</html>
